<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <link rel="stylesheet" href="/styles.css"/>
  <title>GBG - SmartCapture Demo</title>
</head>
<body>
  <div id="spinner" class="centerTop center">
    <span class="loader"></span>
  </div>
  <div id="modal" class="modalContainer hidden">
    <div class="modalContent">
      <button id="modal-close" class="close">✖</button>
      <p id="modal-text">Something went wrong. Please try again.</p>
      <div class="modalActions">
        <button id="modal-back-button" class="secondary">Go Back</button>
        <button id="modal-try-again" class="accept">Try Again</button>
      </div>
    </div>
  </div>
  <div id="menu" class="centerTop hidden">
    <button id="live-doc-button" class="menuButton">SmartCapture-Document</button>
    <button id="live-face-button" class="menuButton">SmartCapture-Face</button>
  </div>

  <div id="error-camera" class="errorCamera hidden">
    Error: camera permissions denied. Please enable camera permissions on your browser to continue.
  </div>
  <live-face-camera
    id="live-face-camera"
  >
  </live-face-camera>
  <div class='centerTop'>
    <live-document-camera
      class='documentCamera hidden'
      id="live-document-camera"
    >
    </live-document-camera>
  </div>
  <div id="face-result" class="formbg padding-horizontal--48 hidden">
    <canvas id='face-canvas' class="padding-bottom--24 canvas-full-width"></canvas>
    <div class="field padding-bottom--24">
      <label for="face-base64-img-input">Base64 String</label>
      <textarea id="face-base64-img-input"></textarea>
    </div>
    <div class="field padding-bottom--10">
      <button id="face-save-button" class="menuButton">Save</button>
    </div>
    <div class="field padding-bottom--24">
      <button id="face-close-results-button" class="menuButton">Go Back</button>
    </div>
  </div>
  <div id="doc-result" class="formbg padding-horizontal--48 hidden">
    <canvas id='doc-canvas' class="padding-bottom--24 canvas-full-width"></canvas>
    <div class="field padding-bottom--24">
      <label for="base64-img-input">Base64 String</label>
      <textarea id="base64-img-input"></textarea>
    </div>
    <div class="field padding-bottom--24">
      <label for="doc-is-good-input">Is good</label>
      <input id="doc-is-good-input" />
    </div>
    <div class="field padding-bottom--24">
      <label for="doc-sharpness-input">Sharpness</label>
      <input id="doc-sharpness-input" />
    </div>
    <div class="field padding-bottom--24">
      <label for="doc-glare-input">Glare free</label>
      <input id="doc-glare-input" />
    </div>
    <div class="field padding-bottom--24">
      <label for="doc-dpi-input">Adequate DPI</label>
      <input id="doc-dpi-input" />
    </div>
    <div class="field padding-bottom--24">
      <label for="doc-failed-checks-input">Failed checks</label>
      <input id="doc-failed-checks-input" />
    </div>
    <div class="field padding-bottom--10">
      <button id="doc-save-button" class="menuButton">Save</button>
    </div>
    <div class="field padding-bottom--10">
      <button id="reset-camera-button" class="menuButton">Capture Back Side</button>
    </div>
    <div class="field padding-bottom--24">
      <button id="doc-close-results-button" class="menuButton">Go Back</button>
    </div>
  </div>
  <script src='/index.js'></script>
</body>
</html>
